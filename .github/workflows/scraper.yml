name: OpenTees Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show scraper file
        run: |
          echo "---- scraper/scrape.js ----"
          cat scraper/scrape.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scraper/scrape.js
        env:
          MANUAL_IMPORT_SECRET: ${{ secrets.MANUAL_IMPORT_SECRET }}

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts
          path: scraper-output
          if-no-files-found: ignore
