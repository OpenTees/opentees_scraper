name: OpenTees Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scraper
        run: node scraper/scrape.js
        env:
          MANUAL_IMPORT_SECRET: ${{ secrets.MANUAL_IMPORT_SECRET }}
